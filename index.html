<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rich-tour Booking System - GREECE</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    .room {
      transition: all 0.2s;
      min-width: 140px;
      position: relative;
    }
    .room.free { background-color: #10b981; color: white; }
    .room.booked { background-color: #ef4444; color: white; }
    .room:hover { transform: scale(1.05); }
    .wave { color: #3b82f6; font-size: 1.2rem; }
    .floor-header {
      background: linear-gradient(90deg, #1e3a8a, #3b82f6);
      color: white;
    }
    .request-num {
      font-size: 1.1rem;
      font-weight: 700;
      background: rgba(255,255,255,0.25);
      padding: 4px 10px;
      border-radius: 9999px;
      margin-top: 6px;
    }
  </style>
</head>
<body class="bg-gray-100">
  <div class="max-w-6xl mx-auto p-6">
    <h1 class="text-4xl font-bold text-center mb-1 text-blue-800">Rich-tour Booking System - GREECE</h1>
    <h2 class="text-2xl text-center text-gray-700 mb-8">Hotel Konstantin 3*</h2>
    <p id="currentDate" class="text-center text-gray-600 mb-8"></p>

    <div class="bg-white rounded-3xl shadow-xl p-8">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
        <div>
          <label class="block text-lg font-medium mb-2">📅 Заїзд (7 ночей)</label>
          <select id="checkin" onchange="loadData()" class="w-full p-5 text-xl border-2 border-gray-300 rounded-2xl"></select>
        </div>
        <div>
          <label class="block text-lg font-medium mb-2">🏨 Готель</label>
          <select id="hotel" class="w-full p-5 text-xl border-2 border-gray-300 rounded-2xl">
            <option value="konstantin">Hotel Konstantin 3*</option>
          </select>
        </div>
      </div>

      <div id="periodStatus" class="mb-6 p-4 text-center text-lg font-medium rounded-2xl"></div>
      <div id="roomsGrid" class="space-y-10"></div>
    </div>
  </div>

  <!-- Модальне вікно бронювання -->
  <div id="bookingModal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center">
    <div class="bg-white rounded-3xl shadow-2xl max-w-md w-full mx-4 p-8">
      <h2 class="text-2xl font-bold mb-6">Бронювання кімнати <span id="modalRoomNumber" class="text-blue-600"></span></h2>
      <div class="space-y-5">
        <div>
          <label class="block text-sm font-medium mb-1">Номер заявки (4-5 цифр)</label>
          <input id="requestNum" type="text" maxlength="5" class="w-full p-4 border-2 rounded-2xl text-lg font-semibold">
        </div>
        <div class="grid grid-cols-3 gap-4">
          <div><label class="block text-sm font-medium mb-1">12+</label><input id="adults" type="number" min="1" value="2" class="w-full p-4 border-2 rounded-2xl text-center"></div>
          <div><label class="block text-sm font-medium mb-1">6-12</label><input id="kids612" type="number" min="0" value="0" class="w-full p-4 border-2 rounded-2xl text-center"></div>
          <div><label class="block text-sm font-medium mb-1">0-5</label><input id="kidsUnder6" type="number" min="0" value="0" class="w-full p-4 border-2 rounded-2xl text-center"></div>
        </div>
      </div>
      <div class="mt-8 flex gap-4">
        <button onclick="confirmBooking()" class="flex-1 bg-green-600 text-white py-4 rounded-2xl text-lg font-medium">Підтвердити</button>
        <button onclick="closeModal()" class="flex-1 bg-gray-400 text-white py-4 rounded-2xl text-lg font-medium">Скасувати</button>
      </div>
    </div>
  </div>

  <!-- Модальне вікно пароля -->
  <div id="passwordModal" class="fixed inset-0 bg-black/70 flex items-center justify-center z-50">
    <div class="bg-white rounded-3xl shadow-2xl max-w-sm w-full mx-4 p-8">
      <h2 class="text-2xl font-bold text-center mb-6">Введіть пароль доступу</h2>
      <input id="passwordInput" type="password" maxlength="4" 
             class="w-full p-6 text-3xl text-center border-2 border-gray-300 rounded-2xl tracking-widest" 
             placeholder="••••">
      <button onclick="checkPassword()" 
              class="mt-6 w-full bg-blue-600 text-white py-4 rounded-2xl text-lg font-medium">
        Увійти
      </button>
    </div>
  </div>

  <script>
    // ================== НАЛАШТУВАННЯ ==================
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyDDyNqQtcycmAEl_LwdwBK63vHpE2ASPw8CEkgaP2fobErztYX9h4jms0eot8k9ysX/exec"; // ← ЗАМІНИ!!!
    const PASSWORD = "6147"; // ← Зміни на свій 4-значний пароль

    const checkinPeriods = ["05/06-14/06","12/06-21/06","19/06-28/06","26/06-05/07","03/07-12/07","10/07-19/07","17/07-26/07","24/07-02/08","31/07-09/08","07/08-16/08","14/08-23/08","21/08-30/08","28/08-06/09","04/09-13/09","11/09-20/09","18/09-27/09"];
    
    let database = {};
    let currentPeriod = "";
    let isAuthenticated = false;

    // Структура готелю (скопіюй повністю з попередньої версії)
    const hotelStructure = {
      konstantin: {
        floors: {
          1: [
            {number: 101, type: "односпальне односпальне", maxGuests: 2},
            {number: 102, type: "односпальне односпальне", maxGuests: 2},
            {number: 103, type: "односпальне односпальне", maxGuests: 2},
            {number: 104, type: "двоспальне односпальне", sea: true, maxGuests: 3},
            {number: 105, type: "односпальне односпальне односпальне", sea: true, maxGuests: 3},
            {number: 106, type: "односпальне односпальне", maxGuests: 2},
            {number: 107, type: "односпальне односпальне", maxGuests: 2},
            {number: 108, type: "односпальне односпальне", maxGuests: 2},
            {number: 109, type: "односпальне односпальне", maxGuests: 2},
            {number: 110, type: "односпальне односпальне", maxGuests: 2},
            {number: 111, type: "односпальне односпальне односпальне", maxGuests: 3},
            {number: 112, type: "двоспальне односпальне", maxGuests: 3},
			{number: 113, type: "односпальне односпальне", maxGuests: 2},
			{number: 114, type: "односпальне односпальне", maxGuests: 2}
          ],
          2: [
            {number: 201, type: "односпальне односпальне", maxGuests: 2}, 
            {number: 202, type: "односпальне односпальне", maxGuests: 2}, 
            {number: 203, type: "односпальне односпальне", maxGuests: 2},
            {number: 204, type: "односпальне односпальне односпальне", sea: true, maxGuests: 3}, 
            {number: 205, type: "односпальне односпальне односпальне", sea: true, maxGuests: 3},
            {number: 206, type: "односпальне односпальне + extra bed", maxGuests: 3}, 
            {number: 207, type: "односпальне односпальне + extra bed", maxGuests: 3},
            {number: 208, type: "односпальне односпальне", maxGuests: 2}, 
            {number: 209, type: "односпальне односпальне", maxGuests: 2}, 
            {number: 210, type: "односпальне односпальне", maxGuests: 2},
            {number: 211, type: "двоспальне односпальне + extra bed", maxGuests: 3}, 
            {number: 212, type: "двоспальне односпальне + extra bed ", maxGuests: 3},
            {number: 213, type: "односпальне односпальне", maxGuests: 2}, 
            {number: 214, type: "односпальне односпальне", maxGuests: 2}
          ],
          3: [
            {number: 301, type: "односпальне односпальне", maxGuests: 2}, 
            {number: 302, type: "односпальне односпальне + extra bed", maxGuests: 3}, 
            {number: 303, type: "односпальне односпальне + extra bed", maxGuests: 3}, 
            {number: 304, type: "двоспальне односпальне", sea: true, maxGuests: 3},
            {number: 305, type: "односпальне односпальне односпальне", sea: true, maxGuests: 3}, 
            {number: 306, type: "односпальне односпальне", maxGuests: 2},
            {number: 307, type: "односпальне односпальне", maxGuests: 2}, 
            {number: 308, type: "односпальне односпальне", maxGuests: 2}, 
            {number: 309, type: "односпальне односпальне", maxGuests: 2},
            {number: 310, type: "односпальне односпальне", maxGuests: 2}, 
            {number: 311, type: "двоспальне односпальне", maxGuests: 3}, 
            {number: 312, type: "двоспальне односпальне", maxGuests: 3}, 
            {number: 313, type: "односпальне односпальне", maxGuests: 2},
            {number: 314, type: "двоспальне (без спинки) + extra bed", maxGuests: 3}
          ]
        }
      }
    };

    // ================== ПАРОЛЬ ==================
    function checkPassword() {
      const input = document.getElementById('passwordInput').value;
      if (input === PASSWORD) {
        isAuthenticated = true;
        document.getElementById('passwordModal').classList.add('hidden');
        initSystem();
      } else {
        alert("❌ Неправильний пароль!");
        document.getElementById('passwordInput').value = '';
      }
    }

    // ================== ЗАВАНТАЖЕННЯ ДАНИХ ==================
    async function loadBookingsFromSheet(period) {
  try {
    const response = await fetch(WEB_APP_URL, {
      method: "POST",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify({ action: "getBookings", period: period })
    });

    const text = await response.text();
    console.log("getBookings відповідь:", text);

    let result = JSON.parse(text);

    if (result.success) {
      database[period] = result.bookings || [];
      console.log(`Завантажено ${database[period].length} бронювань`);
    } else {
      console.warn("getBookings не успіх:", result);
    }
  } catch (error) {
    console.error("Помилка getBookings:", error);
  }
}

    function loadRooms() {
      const grid = document.getElementById('roomsGrid');
      grid.innerHTML = '';
      const floors = hotelStructure.konstantin.floors;

      Object.keys(floors).forEach(floorNum => {
        const rooms = floors[floorNum];
        let html = `<div class="floor-header p-4 rounded-2xl text-xl font-bold mb-6">Поверх ${floorNum}</div>
                    <div class="grid grid-cols-4 md:grid-cols-6 lg:grid-cols-6 gap-8">`;

        rooms.forEach(room => {
          const dbRoom = database[currentPeriod]?.find(r => r.number === room.number);
          const isBooked = dbRoom && dbRoom.booked;
          const seaIcon = room.sea ? '<span class="wave">🌊</span> ' : '';

          html += `
            <div onclick="handleRoomClick(${room.number})"
                 class="room p-4 rounded-2xl cursor-pointer shadow text-center ${isBooked ? 'booked' : 'free'}">
              <div class="text-2xl font-bold">${room.number}</div>
              <div class="text-xs mt-1">${seaIcon}${room.type}</div>
              ${isBooked ? `<div class="request-num">№${dbRoom.guests.requestNum}</div>` : ''}
            </div>`;
        });
        html += `</div>`;
        grid.innerHTML += html;
      });
    }

    async function loadData() {
      currentPeriod = document.getElementById('checkin').value;
      const statusEl = document.getElementById('periodStatus');
      
      const isLocked = isPeriodLocked(currentPeriod);
      statusEl.textContent = isLocked ? "⚠️ Заїзд триває або завершився — зміни заблоковані" : "✅ Можна бронювати";
      statusEl.className = isLocked ? "bg-red-100 text-red-700" : "bg-green-100 text-green-700";

      await loadBookingsFromSheet(currentPeriod);
      loadRooms();
    }

    // ================== БРОНЮВАННЯ ТА ДІЇ ==================
    function handleRoomClick(roomNum) {
      if (!isAuthenticated || isPeriodLocked(currentPeriod)) {
        return alert("Дія заблокована");
      }

      const dbRoom = database[currentPeriod]?.find(r => r.number === roomNum);
      if (dbRoom && dbRoom.booked) {
        if (confirm(`Кімната ${roomNum} заброньована заявкою №${dbRoom.guests.requestNum}\n\nЩо зробити?`)) {
          const action = prompt("1 - Відмінити\n2 - Перенести\nВведіть цифру:");
          if (action === "1") cancelBooking(roomNum);
          if (action === "2") moveBooking(roomNum);
        }
        return;
      }

      document.getElementById('modalRoomNumber').textContent = roomNum;
      document.getElementById('bookingModal').classList.remove('hidden');
    }

async function confirmBooking() {
  const requestNum = document.getElementById('requestNum').value.trim();
  const adults = parseInt(document.getElementById('adults').value) || 0;
  const kids612 = parseInt(document.getElementById('kids612').value) || 0;
  const kidsUnder6 = parseInt(document.getElementById('kidsUnder6').value) || 0;
  const total = adults + kids612 + kidsUnder6;
  const roomNum = parseInt(document.getElementById('modalRoomNumber').textContent);

  if (!requestNum || requestNum.length < 4) 
    return alert("Введіть номер заявки (4-5 цифр)");

  let maxCapacity = 4;
  Object.values(hotelStructure.konstantin.floors).forEach(floor => {
    const room = floor.find(r => r.number === roomNum);
    if (room) maxCapacity = room.maxGuests || 4;
  });
  if (total > maxCapacity) 
    return alert(`Недостатньо місць! Максимум ${maxCapacity} осіб.`);

  const bookingData = {
    action: "book",
    period: currentPeriod,
    room: roomNum,
    requestId: requestNum,
    adults: adults,
    kids612: kids612,
    kidsUnder6: kidsUnder6,
    total: total
  };

  try {
    const response = await fetch(WEB_APP_URL, {
      method: "POST",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify(bookingData)
    });

    const text = await response.text();
    console.log("Відповідь від сервера:", text);

    let result;
    try {
      result = JSON.parse(text);
    } catch (e) {
      result = { success: false, message: "Невірний формат відповіді" };
    }

    // Виправлення для твоєї поточної відповіді сервера
    const isSuccess = result.success === true || result.status === "success";

    if (isSuccess) {
      alert("✅ Кімната успішно заброньована!");
      closeModal();
      await loadData();
    } else {
      alert("❌ " + (result.message || "Помилка бронювання"));
    }
  } catch (error) {
    console.error(error);
    alert("Помилка підключення до сервера");
  }
}

    async function cancelBooking(roomNum) {
      if (!confirm(`Відмінити бронювання ${roomNum}?`)) return;
      try {
        const res = await fetch(WEB_APP_URL, {
          method: "POST",
          headers: {"Content-Type": "text/plain;charset=utf-8"},
          body: JSON.stringify({action: "cancel", period: currentPeriod, room: roomNum})
        });
        const result = await res.json();
        if (result.success) await loadData();
      } catch (e) {}
    }

    async function moveBooking(oldRoomNum) {
      const dbRoom = database[currentPeriod].find(r => r.number === oldRoomNum);
      const totalGuests = dbRoom.guests.total;

      const newRoomInput = prompt(`Перенести заявку №${dbRoom.guests.requestNum} (${totalGuests} чол.) в кімнату:`);
      const newRoomNum = parseInt(newRoomInput);
      if (!newRoomNum) return;

      // Перевірка місткості нової кімнати
      let newMax = 4;
      Object.values(hotelStructure.konstantin.floors).forEach(floor => {
        const r = floor.find(room => room.number === newRoomNum);
        if (r) newMax = r.maxGuests || 4;
      });

      if (totalGuests > newMax) {
        return alert(`❌ Неможливо! Заявка на ${totalGuests} осіб, а в кімнаті ${newRoomNum} максимум ${newMax}.`);
      }

      try {
        const res = await fetch(WEB_APP_URL, {
          method: "POST",
          headers: {"Content-Type": "text/plain;charset=utf-8"},
          body: JSON.stringify({
            action: "move",
            period: currentPeriod,
            oldRoom: oldRoomNum,
            newRoom: newRoomNum,
            requestId: dbRoom.guests.requestNum
          })
        });
        const result = await res.json();
        if (result.success) await loadData();
        else alert(result.message || "Не вдалося перенести");
      } catch (e) { alert("Помилка сервера"); }
    }

    function closeModal() {
      document.getElementById('bookingModal').classList.add('hidden');
    }

    function isPeriodLocked(period) {
      const [startStr] = period.split('-');
      const [d, m] = startStr.split('/').map(Number);
      return new Date() >= new Date(2026, m-1, d);
    }

    function populatePeriods() {
      const select = document.getElementById('checkin');
      select.innerHTML = checkinPeriods.map(p => `<option value="${p}">${p} 2026</option>`).join('');
    }

    async function initSystem() {
      document.getElementById('currentDate').textContent = `Сьогодні: ${new Date().toLocaleDateString('uk-UA')}`;
      populatePeriods();
      document.getElementById('checkin').value = checkinPeriods[3];
      await loadData();
    }

    // Запуск
    window.onload = () => {
      const savedPass = localStorage.getItem('bookingPassword');
      if (savedPass === PASSWORD) {
        isAuthenticated = true;
        document.getElementById('passwordModal').classList.add('hidden');
        initSystem();
      }
    };
  </script>
</body>
</html>
